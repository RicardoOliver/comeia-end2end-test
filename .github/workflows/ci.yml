name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://teste-colmeia-qa.colmeia-corp.com' }}
      APP_EMAIL: ${{ secrets.APP_EMAIL }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: ENABLE_ALLURE=1 npm run test:e2e:gate
      - run: npm run test:bdd
      - name: Allure report (generate)
        if: always()
        run: |
          if [ -d allure-results ]; then
            npx allure generate ./allure-results --clean -o ./allure-report || true
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: reports
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report

  bug-hunt:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://teste-colmeia-qa.colmeia-corp.com' }}
      APP_EMAIL: ${{ secrets.APP_EMAIL }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e:bugs
      - run: npm run test:bdd:bugs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bug-hunt-artifacts
          path: |
            playwright-report
            reports
            test-results
            test-results-bdd

  owasp-dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        env:
          JAVA_HOME: ''
          JAVA_HOME_17_X64: ''
        with:
          project: 'comeia-end2end-test'
          path: '.'
          format: 'HTML'
          others: '--failOnCVSS 7'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: ${{ github.workspace }}/reports

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t comeia-e2e:ci .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: comeia-e2e:ci
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
