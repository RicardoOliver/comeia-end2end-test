name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://teste-colmeia-qa.colmeia-corp.com' }}
      APP_EMAIL: ${{ secrets.APP_EMAIL || vars.APP_EMAIL || 'qa@test.com' }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD || vars.APP_PASSWORD || '123456' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: ENABLE_ALLURE=1 npm run test:e2e:gate
      - run: npm run test:bdd
      - name: Allure report (generate)
        if: always()
        run: |
          if [ -d allure-results ]; then
            npx allure generate ./allure-results --clean -o ./allure-report || true
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: reports
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report

  bug-hunt:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://teste-colmeia-qa.colmeia-corp.com' }}
      APP_EMAIL: ${{ secrets.APP_EMAIL || vars.APP_EMAIL || 'qa@test.com' }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD || vars.APP_PASSWORD || '123456' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: ENABLE_ALLURE=1 npm run test:e2e:bugs || true
      - run: npm run test:bdd:bugs || true
      - name: Allure report (generate)
        if: always()
        run: |
          if [ -d allure-results ]; then
            npx allure generate ./allure-results --clean -o ./allure-report || true
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bug-hunt-artifacts
          path: |
            playwright-report
            reports
            test-results
            test-results-bdd
            allure-results
            allure-report

  owasp-dependency-check:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p reports
          EXTRA_ARGS=""
          if [ -n "${NVD_API_KEY}" ]; then
            EXTRA_ARGS="--nvdApiKey ${NVD_API_KEY}"
          fi
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/github/workspace" \
            owasp/dependency-check-action:latest \
            --project "comeia-end2end-test" \
            --scan "." \
            --format "HTML" \
            --out "/github/workspace/reports" \
            --noupdate \
            --failOnCVSS 7 \
            --disableNodeAudit \
            --disableOssIndex \
            ${EXTRA_ARGS}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: ${{ github.workspace }}/reports

  trivy:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Trivy SARIF
        if: always()
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: trivy-results.sarif

  pages-site:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
    needs: [test, bug-hunt, owasp-dependency-check, trivy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: artifacts/gate/playwright-report
      - uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: artifacts/gate/allure-report
      - uses: actions/download-artifact@v4
        with:
          name: cucumber-reports
          path: artifacts/gate/cucumber
      - uses: actions/download-artifact@v4
        with:
          name: bug-hunt-artifacts
          path: artifacts/bugs
      - uses: actions/download-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: artifacts/security/owasp
      - uses: actions/download-artifact@v4
        with:
          name: trivy-sarif
          path: artifacts/security/trivy
      - run: node scripts/pages-dashboard.js
        env:
          ARTIFACTS_DIR: artifacts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages-site
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
