name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://teste-colmeia-qa.colmeia-corp.com' }}
      APP_EMAIL: ${{ secrets.APP_EMAIL || vars.APP_EMAIL || 'qa@test.com' }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD || vars.APP_PASSWORD || '123456' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: ENABLE_ALLURE=1 npm run test:e2e:gate
      - run: npm run test:bdd
      - name: Allure report (generate)
        if: always()
        run: |
          if [ -d allure-results ]; then
            npx allure generate ./allure-results --clean -o ./allure-report || true
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: reports
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
      - name: Build Pages site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/pages-dashboard.js
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
        continue-on-error: true

  bug-hunt:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://teste-colmeia-qa.colmeia-corp.com' }}
      APP_EMAIL: ${{ secrets.APP_EMAIL || vars.APP_EMAIL || 'qa@test.com' }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD || vars.APP_PASSWORD || '123456' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e:bugs || true
      - run: npm run test:bdd:bugs || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bug-hunt-artifacts
          path: |
            playwright-report
            reports
            test-results
            test-results-bdd

  owasp-dependency-check:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        env:
          JAVA_HOME: /opt/jdk
          JAVA_HOME_17_X64: /opt/jdk
        with:
          project: 'comeia-end2end-test'
          path: '.'
          format: 'HTML'
          others: '--failOnCVSS=7'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: ${{ github.workspace }}/reports

  trivy:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
